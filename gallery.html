<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Varanasi Photo Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 70px;
        }
        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
            padding: 10px 0;
            transition: all 0.3s ease;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .navbar.scrolled {
            padding: 5px 0;
            background: rgba(30, 60, 114, 0.95);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .navbar-brand i {
            margin-right: 8px;
            color: #ffd700;
            font-size: 1.2rem;
        }

        .navbar-nav {
            margin-left: auto;
        }

        .nav-item {
            margin: 0 5px;
            position: relative;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
            padding: 8px 12px !important;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .nav-link i {
            margin-right: 5px;
            font-size: 0.8rem;
        }

        .nav-link:hover {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .nav-link.active {
            color: #fff !important;
            font-weight: 600;
        }

        .nav-link.active:after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 10px;
            width: calc(100% - 20px);
            height: 2px;
            background: #ffd700;
            border-radius: 2px;
        }

        .navbar-toggler {
            border: none;
            padding: 0.5rem;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.9%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        /* Dropdown Menu */
        .dropdown-menu {
            background: rgba(42, 82, 152, 0.95);
            border: none;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            padding: 10px 0;
            margin-top: 8px;
        }

        .dropdown-item {
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Gallery Styles */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .gallery-item {
            position: relative;
            text-align: center;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease-in-out;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        .image-title {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px;
            border-radius: 5px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .modal-content img {
            width: 100%;
        }

        .footer {
            text-align: center;
            color: #fff;
            padding: 10px 0;
            background-color: #1e3c72;
            font-size: 0.9rem;
            margin-top: 2rem;
        }

        .footer .container {
            max-width: 100%;
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-om"></i> Explore Varanasi
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">
                            <i class="fas fa-info-circle"></i> About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="places.html">
                            <i class="fas fa-map-marked-alt"></i> Places
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">
                            <i class="fas fa-images"></i> Gallery
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">
                            <i class="fas fa-envelope"></i> Contact
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="text-center">Photo Gallery</h1>
        <div class="gallery">
            <div class="gallery-item">
                <img src="images/bg1.jpg" alt="Varanasi Ghat" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Varanasi Ghat</div>
            </div>
            <div class="gallery-item">
                <img src="images/g1.jpg" alt="Kashi Vishwanath Temple" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Kashi Vishwanath Temple</div>
            </div>
            <div class="gallery-item">
                <img src="images/i3.jpg" alt="Ganga Aarti" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Ganga Aarti</div>
            </div>
            <div class="gallery-item">
                <img src="images/g2.jpg" alt="Banaras Hindu University" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Banaras Hindu University</div>
            </div>
            <div class="gallery-item">
                <img src="images/g3.jpg" alt="Sarnath" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Sarnath</div>
            </div>
            <div class="gallery-item">
                <img src="images/p4.jpg" alt="Ramnagar Fort" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Ramnagar Fort</div>
            </div>
            <div class="gallery-item">
                <img src="images/g5.jpg" alt="Evening view of Varanasi" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Evening View of Varanasi</div>
            </div>
            <div class="gallery-item">
                <img src="images/g4.jpg" alt="Boat ride on the Ganges" data-bs-toggle="modal" data-bs-target="#lightboxModal">
                <div class="image-title">Boat Ride on the Ganges</div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="Enlarged Image">
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto">
        <div class="container">
            <small>© 2025 Explore Varanasi</small>
            <div class="mt-1">
                <a href="#" class="text-white mx-1"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="text-white mx-1"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-white mx-1"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>
    
    <script>
        document.querySelectorAll('.gallery img').forEach(img => {
            img.addEventListener('click', function() {
                document.getElementById('modalImage').src = this.src;
            });
        });
    </script>
</body>
</html>
